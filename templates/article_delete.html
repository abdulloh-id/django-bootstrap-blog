{% extends 'base.html' %}

{% block content %}
<main class="section py-5"> 
    <div class="container"> 
        <div class="row justify-content-center"> 
            <div class="col-lg-8 col-md-10 col-sm-12 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header bg-light">
                        <h2 class="card-title mb-0 text-primary text-center">Postni o‘chirish</h2>
                    </div>
                    <div class="card-body p-4">
                        <form action="" method="post">{% csrf_token %}
                            <p>"{{ object.title }}" nomli postni o‘chirishni istaysizmi?</p>
                            <div class="mt-4 text-end">
                                <button class="btn btn-light me-2" type="button" onclick="history.back()">Bekor qilish</button>
                                <button class="btn btn-danger ml-2" type="submit">Ha</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock content %}

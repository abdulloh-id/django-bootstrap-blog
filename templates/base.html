<!DOCTYPE html>

{% load static %}
<html lang="en-us">

<head>
   <meta charset="utf-8">
   <title>{% block title %}Logbook - Homepage{% endblock title %}</title>
   <!-- mobile responsive meta -->
   <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
   <meta name="description" content="{% block meta_description %}This is meta description{% endblock %}">
   <meta name="author" content="Themefisher">
   <!-- plugins -->
   <link rel="preload" href="https://fonts.gstatic.com/s/opensans/v18/mem8YaGs126MiZpBA-UFWJ0bbck.woff2" style="font-display: optional;">
   <link rel="stylesheet" href="{% static 'plugins/bootstrap/bootstrap.min.css' %}">
   <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:600%7cOpen&#43;Sans&amp;display=swap" media="screen">
   <link rel="stylesheet" href="{% static 'plugins/themify-icons/themify-icons.css' %}">
   <link rel="stylesheet" href="{% static 'plugins/slick/slick.css' %}">
   <!-- Main Stylesheet -->
   <link rel="stylesheet" href="{% static 'css/style.css' %}">
   <!--Favicon-->
   <link rel="shortcut icon" href="{% static 'images/favicon.png' %}" type="image/x-icon">
   <link rel="icon" href="{% static 'images/favicon.png' %}" type="image/x-icon">
   {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Include the header -->
    {% include 'header.html' %}
    
    <!-- Main content area -->
    <main>
        {% block content %}
        {% endblock content %}
    </main>
    
    <!-- Include the footer -->
    {% include 'footer.html' %}
    
    <!-- JS Plugins -->
    <script src="{% static 'plugins/jQuery/jquery.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap/bootstrap.min.js' %}" async></script>
    <script src="{% static 'plugins/slick/slick.min.js' %}"></script>
    <!-- Main Script -->
    <script src="{% static 'js/script.js' %}"></script>
    
    {% block extra_js %}{% endblock extra_js %}
</body>
</html>

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Ro'yxatdan o'tish{% endblock title %}
{% block content %}
<main class="section py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-light text-center py-3">
                    <h2 class="text-primary">Ro'yxatdan o'tish</h2>
                    <p class="text-muted">Yangi hisob yaratish uchun ma'lumotlarni to'ldiring</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="termsAgreed" required>
                            <label class="form-check-label" for="termsAgreed">
                                <small>Men <a href="{% url 'terms-conditions' %}">foydalanish shartlari</a> va <a href="{% url 'privacy-policy' %}">maxfiylik siyosati</a> bilan tanishdim va roziman</small>
                            </label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Ro'yxatdan o'tish</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <p class="mb-0">Hisobingiz bormi? <a href="{% url 'login' %}">Kirish</a></p>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock content %}

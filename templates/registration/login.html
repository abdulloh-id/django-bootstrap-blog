{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Kirish{% endblock title %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6"> <!-- Adjust the width using Bootstrap columns -->
            <h2 class="text-center">Saytga kirish</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary mt-3">Kirish</button>
                <a class="btn btn-outline-danger mt-3" href="{% url 'password_reset' %}" role="button">Parolni tiklash</a>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

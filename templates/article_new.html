{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<section class="section"> 
    <div class="container"> 
        <div class="row justify-content-center"> 
            <div class="col-md-12"> 
                <h1>Yangi post</h1>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.media }}
                    {{ form.errors }}
                    {{ form|crispy }}
                    <button class="btn btn-success ml-2" type="submit">Saqlash</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
